/* ============================================================
   RESPONSIVE TYPOGRAPHY OVERRIDE
   All page text scales from the root font-size (fluid clamp).
   This ensures text fits the screen at any size without breaking.
   ============================================================ */
.page, .page * {
  font-family: 'Times New Roman', Times, serif !important;
}

/* Convert fixed px sizes into em-based relative sizes */
.title-main        { font-size: clamp(32px, 5.5vw, 60px) !important; line-height: 1; }

.issue-tag         { font-size: clamp(9px,  1vw,  12px) !important; }

.meta-value        { font-size: clamp(11px, 1.2vw, 14px) !important; }

.cover-top         { font-size: clamp(9px,  1vw,  12px) !important; }
.cover-title       { font-size: clamp(28px, 5vw,  54px) !important; line-height: 0.95; }
.cover-title .big12{ font-size: 1.5em !important; }
.cover-subtitle    { font-size: clamp(14px, 1.8vw, 20px) !important; }

.cover-bottom-label{ font-size: clamp(8px,  0.9vw, 10px) !important; }
.cover-back-title  { font-size: clamp(18px, 2.8vw, 28px) !important; }
.cover-back-body   { font-size: clamp(10px, 1.2vw, 13px) !important; line-height: 1.55; }
.cover-back-credits{ font-size: clamp(8px,  0.95vw, 11px) !important; }
.barcode-label     { font-size: clamp(7px,  0.8vw, 10px) !important; }

.principle-number       { font-size: clamp(25px, 3.8vw, 40px) !important; }

.placeholder-scene      { font-size: clamp(9px, 1.1vw, 12px) !important; line-height: 1.3; }
.placeholder-timestamp  { font-size: clamp(8px, 1vw, 11px) !important; }
.placeholder-hint       { font-size: clamp(7px, 0.85vw, 10px) !important; }

.info-card-label        { font-size: clamp(10px, 1.15vw, 13px) !important; }
.info-card-body         { font-size: clamp(14px, 1.7vw, 18px) !important; line-height: 1.5; }
.annotation-chip        { font-size: clamp(11px, 1.3vw, 14px) !important; }
.sfx-corner             { font-size: clamp(13px, 1.8vw, 20px) !important; }

.report-header h1       { font-size: clamp(23px, 3.3vw, 34px) !important; }
.report-header .kicker  { font-size: clamp(11px, 1.3vw, 15px) !important; }
.report-header .meta-line { font-size: clamp(10px, 1.2vw, 13px) !important; }
.report-body            { font-size: clamp(12px, 1.35vw, 15px) !important; line-height: 1.52; }
.report-body h3         { font-size: clamp(11px, 1.4vw, 15px) !important; }
.report-callout         { font-size: clamp(10px, 1.2vw, 13px) !important; line-height: 1.3; }

.conclusion-header h1   { font-size: clamp(26px, 4.5vw, 48px) !important; }
.conclusion-header .kicker { font-size: clamp(11px, 1.5vw, 16px) !important; }

/* Navigation / TOC remain fixed-size for touch targets */

/* ============================================================
   TOKENS
   ============================================================ */
:root {
  --ink: #0a0a0a;
  --paper: #f4ecd8;
  --paper-dark: #e8dcc0;
  --spider-red: #e63946;
  --spider-red-deep: #b32030;
  --spider-blue: #1f4ed8;
  --spider-blue-deep: #0c2a9e;
  --spider-yellow: #ffd60a;
  --spider-magenta: #ff006e;
  --spider-cyan: #3a86ff;
  --app-height: 100vh;
  --nav-reserve: 90px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --book-scale: 1;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: var(--app-height);
  height: var(--app-height);
  font-family: 'Times New Roman', Times, serif;
  color: var(--ink);
  overflow: hidden;
  /* Fluid base font-size: scales between 11px (tiny screens) and 16px (large) */
  font-size: clamp(11px, 1.3vw, 16px);
}

body {
  background: var(--ink);
  background-image:
    radial-gradient(circle at 20% 50%, rgba(230,57,70,0.18) 0%, transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(31,78,216,0.18) 0%, transparent 40%),
    radial-gradient(circle at 50% 80%, rgba(255,214,10,0.12) 0%, transparent 40%);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: calc(8px + var(--safe-top)) clamp(8px, 1.4vw, 20px) calc(var(--nav-reserve) + var(--safe-bottom)) clamp(8px, 1.4vw, 20px);
}

/* ============================================================
   BOOK STAGE (StPageFlip target)
   ============================================================ */
.book-stage {
  flex: 1 1 auto;
  width: min(100%, 1800px);
  min-height: 0;
  display: flex;
  align-items: stretch;
  justify-content: center;
}

.book-viewport {
  flex: 1 1 auto;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x pan-y;
  display: grid;
  place-items: center center;
  padding: clamp(4px, 1vh, 10px) clamp(4px, 1vw, 12px);
}

.book-viewport.is-zoomed {
  overflow: auto;
  place-items: start center;
}

.book-viewport.single-page-mode {
  flex-grow: 1;
  width: 100%;
}

.book-shell {
  position: relative;
  width: 0;
  height: 0;
  flex: none;
}

.book-viewport.is-zoomed .book-shell {
  overflow: hidden;
}

#flipbook {
  margin: 0;
  transform-origin: top left;
  transform: scale(var(--book-scale));
  will-change: transform;
  /* StPageFlip sets inline width/height; these are fallback */
}

.page {
  background: var(--paper);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(0,0,0,0.10) 1px, transparent 0);
  background-size: 4px 4px;
  border: 3px solid var(--ink);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}

.page-inner {
  padding: clamp(12px, 2.2vw, 26px) clamp(14px, 2.6vw, 30px);
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  position: relative;
  display: flex;
  flex-direction: column;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.page-inner::-webkit-scrollbar { width: 6px; }
.page-inner::-webkit-scrollbar-track { background: transparent; }
.page-inner::-webkit-scrollbar-thumb { background: var(--ink); border-radius: 3px; }

/* Halftones */
.halftone {
  position: absolute;
  pointer-events: none;
  background-image: radial-gradient(circle, var(--ink) 1.2px, transparent 1.4px);
  background-size: 8px 8px;
  opacity: 0.35;
  z-index: 0;
}
.halftone-red { background-image: radial-gradient(circle, var(--spider-red) 1.5px, transparent 1.7px); opacity: 0.5; }
.halftone-blue { background-image: radial-gradient(circle, var(--spider-blue) 1.5px, transparent 1.7px); opacity: 0.5; }
.halftone-yellow { background-image: radial-gradient(circle, var(--spider-yellow) 2px, transparent 2.2px); opacity: 0.6; }

.page-inner > * { position: relative; z-index: 1; }

/* ============================================================
   BOOK COVERS (hard — front & back)
   ============================================================ */
.cover {
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.06) 0%, transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(0,0,0,0.35) 0%, transparent 50%),
    linear-gradient(135deg, #8b0000 0%, #4a0000 100%);
  color: var(--paper);
  border: 4px solid #2a0000;
  position: relative;
  overflow: hidden;
}

/* Leather-grain texture using repeating gradients */
.cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,0.04) 2px 3px),
    repeating-linear-gradient(90deg, transparent 0 3px, rgba(0,0,0,0.03) 3px 4px);
  pointer-events: none;
  z-index: 1;
}

/* Embossed frame */
.cover::after {
  content: '';
  position: absolute;
  inset: 18px;
  border: 3px double rgba(255,214,10,0.6);
  pointer-events: none;
  z-index: 2;
  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.4),
    0 0 0 2px rgba(255,214,10,0.15);
}

.cover .page-inner {
  padding: clamp(16px, 3vw, 36px) clamp(14px, 2.6vw, 30px);
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  text-align: center;
}

/* FRONT COVER */
.cover-front .cover-top {
  font-family: 'Times New Roman', Times, serif;
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--spider-yellow);
  text-transform: uppercase;
  padding-top: 10px;
}

.cover-front .cover-spider-emblem {
  width: 120px;
  height: 120px;
  margin: 12px auto;
  position: relative;
  display: grid;
  place-items: center;
}

.cover-front .cover-spider-emblem svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
}

.cover-front .cover-title {
  font-family: 'Times New Roman', Times, serif;
  font-size: clamp(36px, 7vw, 58px);
  line-height: 0.9;
  color: var(--paper);
  text-shadow:
    -2px 0 0 var(--spider-cyan),
    2px 0 0 var(--spider-magenta),
    4px 4px 0 #000;
  letter-spacing: 0.02em;
  transform: skew(-4deg);
  margin: 8px 0;
}

.cover-front .cover-title .big12 {
  display: block;
  font-size: 1.5em;
  color: var(--spider-yellow);
  -webkit-text-stroke: 2px #000;
  margin: 6px 0;
}

.cover-front .cover-subtitle {
  font-family: 'Times New Roman', Times, serif;
  font-size: 18px;
  color: var(--spider-yellow);
  text-shadow: 2px 2px 0 #000;
  margin-top: 8px;
}

.cover-front .cover-film {
  font-family: 'Times New Roman', Times, serif;
  font-size: 13px;
  color: var(--paper);
  background: rgba(0,0,0,0.5);
  padding: 6px 14px;
  border: 2px solid var(--spider-yellow);
  margin-top: 12px;
  letter-spacing: 0.05em;
}

.cover-front .open-hint {
  font-family: 'Times New Roman', Times, serif;
  font-size: 14px;
  color: var(--spider-yellow);
  padding: 10px 18px;
  background: rgba(0,0,0,0.6);
  border: 2px dashed var(--spider-yellow);
  border-radius: 4px;
  animation: pulse-hint 2s ease-in-out infinite;
  cursor: pointer;
  user-select: none;
}

.cover-front .open-hint .arrow {
  display: inline-block;
  margin-left: 6px;
  animation: arrow-nudge 1.2s ease-in-out infinite;
}

@keyframes pulse-hint {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.04); opacity: 0.85; }
}

@keyframes arrow-nudge {
  0%, 100% { transform: translateX(0); }
  50%      { transform: translateX(6px); }
}

.cover-front .cover-credentials {
  margin: clamp(10px, 1.8vw, 18px) auto;
  width: 98%;
  max-width: 540px;
  background: rgba(0,0,0,0.55);
  border: 3px solid var(--spider-yellow);
  padding: clamp(14px, 2vw, 22px) clamp(16px, 2.2vw, 26px);
  display: flex;
  flex-direction: column;
  gap: clamp(10px, 1.4vw, 16px);
  box-shadow: inset 0 0 14px rgba(0,0,0,0.7), 4px 4px 0 rgba(255,214,10,0.25);
  position: relative;
  z-index: 3;
}

.cover-front .cred-row {
  display: flex;
  gap: clamp(12px, 1.8vw, 18px);
  align-items: stretch;
}

.cover-front .cred-cell {
  flex: 1;
  border-bottom: 1px dashed rgba(255,214,10,0.4);
  padding: 3px 0 5px;
  text-align: left;
  min-width: 0;
}

.cover-front .cred-row:last-child .cred-cell,
.cover-front .cred-row:nth-last-child(2) .cred-cell {
  border-bottom: 1px dashed rgba(255,214,10,0.4);
}

.cover-front .cred-label {
  font-family: 'Times New Roman', Times, serif;
  font-size: clamp(12px, 1.5vw, 16px) !important;
  letter-spacing: 0.15em;
  color: var(--spider-yellow);
  text-transform: uppercase;
  opacity: 0.9;
  margin-bottom: 4px;
}

.cover-front .cred-value {
  font-family: 'Times New Roman', Times, serif;
  font-size: clamp(18px, 2.4vw, 26px) !important;
  color: var(--paper);
  font-weight: bold;
  letter-spacing: 0.02em;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
  overflow: visible;
  text-overflow: clip;
  white-space: normal;
}

.cover-front .cover-bottom-label {
  font-family: 'Times New Roman', Times, serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(244,236,216,0.6);
}

/* Corner ornaments */
.cover-corner {
  position: absolute;
  width: 36px;
  height: 36px;
  border: 2px solid var(--spider-yellow);
  z-index: 2;
  opacity: 0.7;
}
.cover-corner.tl { top: 26px; left: 26px; border-right: none; border-bottom: none; }
.cover-corner.tr { top: 26px; right: 26px; border-left: none; border-bottom: none; }
.cover-corner.bl { bottom: 26px; left: 26px; border-right: none; border-top: none; }
.cover-corner.br { bottom: 26px; right: 26px; border-left: none; border-top: none; }

/* BACK COVER */
.cover-back .cover-back-title {
  font-family: 'Times New Roman', Times, serif;
  font-size: 26px;
  color: var(--spider-yellow);
  text-shadow: 3px 3px 0 #000;
  letter-spacing: 0.05em;
  margin-top: 18px;
  transform: skew(-3deg);
}

.cover-back .cover-back-body {
  font-family: 'Times New Roman', Times, serif;
  font-size: 12px;
  color: var(--paper);
  line-height: 1.55;
  max-width: 340px;
  margin: 16px auto;
  font-weight: 500;
}

.cover-back .cover-back-body p { margin-bottom: 10px; }

.cover-back .cover-back-credits {
  font-family: 'Times New Roman', Times, serif;
  font-size: 10px;
  color: var(--spider-yellow);
  letter-spacing: 0.15em;
  padding: 10px 16px;
  background: rgba(0,0,0,0.45);
  border-top: 2px solid rgba(255,214,10,0.4);
  border-bottom: 2px solid rgba(255,214,10,0.4);
  margin: 12px 0;
}

.cover-back .back-close-hint {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 8px auto 12px;
  padding: 8px 14px;
  background: var(--spider-yellow);
  color: var(--ink);
  border: 3px solid #000;
  box-shadow: 4px 4px 0 var(--spider-red);
  font-family: 'Times New Roman', Times, serif;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 0.08em;
  cursor: pointer;
  user-select: none;
}

.cover-back .back-close-hint:hover {
  background: var(--paper);
  transform: translate(-1px, -1px);
}

.cover-back .cover-back-barcode {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  margin-top: auto;
}

.cover-back .barcode-lines {
  display: flex;
  gap: 1.5px;
  align-items: flex-end;
  height: 46px;
  background: var(--paper);
  padding: 4px;
  border: 2px solid #000;
}

.cover-back .barcode-lines span {
  display: block;
  width: 2px;
  background: #000;
  height: 100%;
}
.cover-back .barcode-lines span:nth-child(2n) { width: 1px; height: 80%; }
.cover-back .barcode-lines span:nth-child(3n) { width: 3px; }
.cover-back .barcode-lines span:nth-child(5n) { width: 1px; }
.cover-back .barcode-lines span:nth-child(7n) { width: 4px; height: 90%; }

.cover-back .barcode-label {
  font-family: 'Times New Roman', Times, serif;
  font-size: 9px;
  color: var(--paper);
  letter-spacing: 0.15em;
}

/* ============================================================
   TITLE PAGE (p.0)
   ============================================================ */
.title-page {
  background: var(--spider-red);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(0,0,0,0.25) 1px, transparent 0),
    linear-gradient(135deg, var(--spider-red) 0%, var(--spider-red-deep) 100%);
  background-size: 6px 6px, 100% 100%;
  color: var(--paper);
}

.title-page .page-inner {
  padding: clamp(14px, 2.8vw, 32px) clamp(16px, 3vw, 36px);
  justify-content: space-between;
}

.title-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}

.inti-badge {
  background: var(--paper);
  color: var(--ink);
  padding: 7px 12px;
  border: 3px solid var(--ink);
  box-shadow: 4px 4px 0 var(--ink);
  font-family: 'Times New Roman', Times, serif;
  font-size: 11px;
  letter-spacing: 0.05em;
  transform: rotate(-2deg);
}

.issue-tag {
  background: var(--spider-yellow);
  color: var(--ink);
  padding: 7px 12px;
  border: 3px solid var(--ink);
  box-shadow: 4px 4px 0 var(--ink);
  font-family: 'Times New Roman', Times, serif;
  font-size: 11px;
  transform: rotate(2deg);
}

.title-hero { text-align: center; padding: 14px 0; }

.title-kicker {
  font-family: 'Times New Roman', Times, serif;
  color: var(--spider-yellow);
  font-size: 22px;
  letter-spacing: 0.05em;
  text-shadow: 2px 2px 0 var(--ink);
  margin-bottom: 8px;
  transform: rotate(-2deg);
  display: inline-block;
}

.title-main {
  font-family: 'Times New Roman', Times, serif;
  font-size: clamp(42px, 8vw, 72px);
  line-height: 1;
  color: var(--paper);
  font-weight: 900;
  font-style: italic;
  text-shadow:
    -1.5px 0 0 var(--spider-cyan),
    1.5px 0 0 var(--spider-magenta),
    3px 3px 0 var(--ink);
  margin: 6px 0;
  transform: skew(-4deg);
}

.title-main .twelve {
  display: block;
  font-size: 1.3em;
  color: var(--spider-yellow);
  -webkit-text-stroke: 2px var(--ink);
  margin: 4px 0;
}

.title-sub {
  font-family: 'Times New Roman', Times, serif;
  font-size: clamp(16px, 2.4vw, 24px);
  color: var(--paper);
  letter-spacing: 0.08em;
  text-shadow: 3px 3px 0 var(--ink);
  margin-top: 10px;
}

.title-movie-tag {
  display: inline-block;
  background: var(--ink);
  color: var(--spider-yellow);
  padding: 8px 18px;
  margin-top: 14px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 14px;
  letter-spacing: 0.08em;
  border: 3px solid var(--paper);
  box-shadow: 4px 4px 0 var(--paper);
  transform: rotate(-1deg);
}

.title-meta {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: clamp(6px, 1.2vw, 12px);
  margin-top: clamp(10px, 1.8vw, 18px);
}

.meta-card {
  background: var(--paper);
  color: var(--ink);
  border: 3px solid var(--ink);
  padding: 10px 12px;
  box-shadow: 4px 4px 0 var(--ink);
}

.meta-card.accent-blue { background: var(--spider-blue); color: var(--paper); }
.meta-card.accent-yellow { background: var(--spider-yellow); }

.meta-label {
  font-family: 'Times New Roman', Times, serif;
  font-size: 9px;
  letter-spacing: 0.15em;
  opacity: 0.75;
  margin-bottom: 4px;
  text-transform: uppercase;
}

.meta-value {
  font-family: 'Times New Roman', Times, serif;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0.02em;
}

.meta-value.blank {
  border-bottom: 3px dashed currentColor;
  min-height: 20px;
  padding-bottom: 2px;
  opacity: 0.5;
  font-style: italic;
  font-size: 12px;
}

.title-decor-sfx {
  position: absolute;
  font-family: 'Times New Roman', Times, serif;
  color: var(--spider-yellow);
  text-shadow: 4px 4px 0 var(--ink);
  pointer-events: none;
  z-index: 2;
}
.sfx-thwip { top: 22%; right: 5px; font-size: 30px; transform: rotate(12deg); }
.sfx-pow { bottom: 40%; left: 10px; font-size: 28px; color: var(--spider-cyan); transform: rotate(-14deg); }

/* ============================================================
   PRINCIPLE PAGE LAYOUT (single-column, compact for spread)
   ============================================================ */
.principle-page .page-inner {
  gap: clamp(6px, 1.2vw, 12px);
}

.principle-header {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: clamp(8px, 1.4vw, 14px);
  padding-bottom: clamp(6px, 1vw, 10px);
  border-bottom: 3px solid var(--ink);
}

.principle-number {
  font-family: 'Times New Roman', Times, serif;
  font-size: 32px;
  line-height: 1;
  color: var(--spider-red);
  font-weight: 900;
  font-style: italic;
  text-shadow: 2px 2px 0 var(--ink);
  padding: 4px 12px;
  background: var(--spider-yellow);
  border: 3px solid var(--ink);
  box-shadow: 3px 3px 0 var(--ink);
  transform: rotate(-3deg);
}

.principle-title-block h1 {
  font-family: 'Times New Roman', Times, serif;
  font-size: clamp(16px, 2.4vw, 22px);
  line-height: 1.1;
  color: var(--ink);
  text-shadow: 1px 1px 0 rgba(255, 214, 10, 0.7);
  letter-spacing: 0.01em;
  font-weight: 700;
}

.principle-title-block .tagline {
  font-family: 'Times New Roman', Times, serif;
  font-size: 12px;
  color: var(--spider-red);
  margin-top: 3px;
}

.principle-pagecount {
  font-family: 'Times New Roman', Times, serif;
  color: var(--ink);
  background: var(--paper-dark);
  padding: 4px 8px;
  border: 2px solid var(--ink);
  font-size: 10px;
  box-shadow: 2px 2px 0 var(--ink);
}

/* Scene image panel (fills most of page) */
.scene-panel {
  background: var(--ink);
  border: 3px solid var(--ink);
  box-shadow: 4px 4px 0 var(--ink);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex: 0 0 auto;
  min-height: 300px;
}

.scene-header {
  background: var(--spider-yellow);
  border-bottom: 2px solid var(--ink);
  padding: 4px 10px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.rec-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--spider-red);
  border-radius: 50%;
  animation: rec-blink 1.6s infinite;
}

@keyframes rec-blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0.25; }
}

.screenshot-frame {
  flex: 0 0 auto;
  position: relative;
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 12px, transparent 12px 24px),
    radial-gradient(circle, #1a1a1a 0%, #000 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 260px;
  aspect-ratio: 16 / 9;
  overflow: hidden;
}

.screenshot-placeholder {
  width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  text-align: center;
  padding: 12px;
  color: var(--paper);
}

.screenshot-placeholder img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.screenshot-placeholder.has-image {
  display: block;
  padding: 0;
  background: #000;
}

.scene-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
  background: #000;
  image-rendering: auto;
  filter: saturate(1.04) contrast(1.08);
  transform: translateZ(0);
  backface-visibility: hidden;
}

.motion-guide {
  position: absolute;
  inset: 0;
  z-index: 4;
  pointer-events: none;
}

.motion-guide .motion-dash {
  position: absolute;
  display: block;
  width: 55%;
  height: 34%;
  border-top: 5px dashed rgba(255,214,10,0.96);
  border-radius: 50%;
  filter: drop-shadow(2px 2px 0 #000);
}

.motion-guide .motion-dash-b {
  border-color: rgba(58,134,255,0.9);
  opacity: 0.85;
}

.motion-guide .motion-node {
  position: absolute;
  display: block;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(230,57,70,0.8);
  border: 3px solid var(--spider-yellow);
  box-shadow: 2px 2px 0 #000;
}

.motion-guide .motion-node:nth-child(4) { transform: scale(0.75); opacity: 0.75; }
.motion-guide .motion-node:nth-child(5) { transform: scale(0.55); opacity: 0.55; }

.motion-stretch .motion-dash-a { right: 8%; top: 30%; transform: rotate(-18deg); }
.motion-stretch .motion-dash-b { right: 20%; top: 46%; width: 34%; transform: rotate(10deg); }
.motion-stretch .motion-node-1 { right: 12%; top: 33%; }
.motion-stretch .motion-node-2 { right: 30%; top: 43%; }
.motion-stretch .motion-node-3 { right: 48%; top: 53%; }

.motion-anticipation .motion-dash-a { left: 28%; bottom: 12%; width: 28%; height: 30%; transform: rotate(-55deg); }
.motion-anticipation .motion-dash-b { left: 33%; bottom: 18%; width: 18%; height: 20%; transform: rotate(-18deg); }
.motion-anticipation .motion-node-1 { left: 28%; bottom: 18%; }
.motion-anticipation .motion-node-2 { left: 37%; bottom: 26%; }
.motion-anticipation .motion-node-3 { left: 46%; bottom: 34%; }

.motion-pose .motion-dash-a { left: 12%; top: 24%; width: 68%; height: 44%; transform: rotate(8deg); }
.motion-pose .motion-dash-b { left: 18%; top: 52%; width: 60%; height: 30%; transform: rotate(-10deg); }
.motion-pose .motion-node-1 { left: 16%; top: 58%; }
.motion-pose .motion-node-2 { left: 42%; top: 36%; }
.motion-pose .motion-node-3 { left: 74%; top: 22%; }

.motion-follow .motion-dash-a { right: 8%; top: 22%; width: 62%; height: 34%; transform: rotate(8deg); }
.motion-follow .motion-dash-b { right: 14%; top: 44%; width: 48%; height: 24%; transform: rotate(-6deg); }
.motion-follow .motion-node-1 { right: 15%; top: 25%; }
.motion-follow .motion-node-2 { right: 32%; top: 37%; }
.motion-follow .motion-node-3 { right: 52%; top: 48%; }

.motion-slow .motion-dash-a { left: 12%; top: 18%; width: 72%; height: 62%; transform: rotate(-4deg); }
.motion-slow .motion-dash-b { left: 20%; top: 42%; width: 48%; height: 28%; transform: rotate(8deg); }
.motion-slow .motion-node-1 { left: 17%; top: 56%; }
.motion-slow .motion-node-2 { left: 39%; top: 38%; }
.motion-slow .motion-node-3 { left: 74%; top: 26%; }

.motion-arc .motion-dash-a { left: 9%; top: 10%; width: 78%; height: 70%; transform: rotate(-12deg); }
.motion-arc .motion-dash-b { left: 18%; top: 24%; width: 58%; height: 50%; transform: rotate(-16deg); }
.motion-arc .motion-node-1 { left: 16%; top: 54%; }
.motion-arc .motion-node-2 { left: 43%; top: 31%; }
.motion-arc .motion-node-3 { left: 78%; top: 20%; }

.motion-secondary .motion-dash-a { left: 35%; bottom: 20%; width: 22%; height: 18%; transform: rotate(12deg); }
.motion-secondary .motion-dash-b { left: 45%; bottom: 28%; width: 18%; height: 16%; transform: rotate(-16deg); }
.motion-secondary .motion-node-1 { left: 38%; bottom: 24%; }
.motion-secondary .motion-node-2 { left: 49%; bottom: 31%; }
.motion-secondary .motion-node-3 { left: 58%; bottom: 38%; }

.motion-timing .motion-dash-a { left: 16%; bottom: 22%; width: 70%; height: 28%; transform: rotate(-4deg); }
.motion-timing .motion-dash-b { left: 22%; bottom: 34%; width: 46%; height: 20%; transform: rotate(2deg); border-style: dotted; }
.motion-timing .motion-node-1 { left: 22%; bottom: 26%; }
.motion-timing .motion-node-2 { left: 45%; bottom: 36%; }
.motion-timing .motion-node-3 { left: 76%; bottom: 43%; }

.image-missing {
  border: 2px dashed var(--spider-red);
}

.placeholder-icon {
  width: 36px;
  height: 36px;
  border: 2px dashed var(--spider-yellow);
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--spider-yellow);
  font-family: 'Times New Roman', Times, serif;
  font-size: 16px;
}

.placeholder-label {
  font-family: 'Times New Roman', Times, serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--spider-yellow);
}

.placeholder-scene {
  font-family: 'Times New Roman', Times, serif;
  font-size: 11px;
  color: var(--paper);
  max-width: 90%;
  line-height: 1.3;
}

.placeholder-timestamp {
  background: var(--spider-yellow);
  color: var(--ink);
  padding: 3px 8px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 10px;
  margin-top: 4px;
  letter-spacing: 0.1em;
}

.placeholder-hint {
  font-size: 9px;
  color: rgba(244,236,216,0.55);
  font-style: italic;
  margin-top: 4px;
}

.screenshot-frame::before,
.screenshot-frame::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  border: 2px solid var(--spider-yellow);
  pointer-events: none;
  z-index: 2;
}
.screenshot-frame::before { top: 8px; left: 8px; border-right: none; border-bottom: none; }
.screenshot-frame::after { bottom: 8px; right: 8px; border-left: none; border-top: none; }

/* Text / info cards */
.info-stack {
  display: flex;
  flex-direction: column;
  gap: clamp(5px, 1vw, 10px);
}

.info-card {
  background: var(--paper);
  border: 2px solid var(--ink);
  box-shadow: 3px 3px 0 var(--ink);
  padding: 9px 11px;
}

.info-card.accent-red {
  background: var(--spider-red);
  color: var(--paper);
}
.info-card.accent-blue {
  background: var(--spider-blue);
  color: var(--paper);
}

.info-card-label {
  font-family: 'Times New Roman', Times, serif;
  font-size: 9px;
  letter-spacing: 0.12em;
  margin-bottom: 3px;
  opacity: 0.9;
}

.info-card-body {
  font-size: 13px;
  line-height: 1.45;
  font-weight: 600;
}

.info-card-body strong {
  font-weight: 900;
  background: var(--spider-yellow);
  color: var(--ink);
  padding: 0 3px;
}

.info-card.accent-red .info-card-body strong,
.info-card.accent-blue .info-card-body strong {
  background: var(--spider-yellow);
}

/* Footer */
.principle-footer {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: clamp(6px, 1.2vw, 12px);
  align-items: center;
  padding-top: clamp(4px, 0.8vw, 8px);
  border-top: 2px solid var(--ink);
  margin-top: auto;
}

.annotations-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.annotation-chip {
  background: var(--paper);
  border: 2px solid var(--ink);
  padding: 3px 8px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 10px;
  color: var(--ink);
  box-shadow: 2px 2px 0 var(--ink);
}

.annotation-chip.red { background: var(--spider-red); color: var(--paper); }
.annotation-chip.blue { background: var(--spider-blue); color: var(--paper); }
.annotation-chip.yellow { background: var(--spider-yellow); }

.sfx-corner {
  font-family: 'Times New Roman', Times, serif;
  font-size: 18px;
  color: var(--spider-red);
  text-shadow: 2px 2px 0 var(--ink);
  transform: rotate(-6deg);
  white-space: nowrap;
}

/* ============================================================
   REFLECTION REPORT PAGE
   ============================================================ */
.report-page {
  background: var(--paper);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(0,0,0,0.10) 1px, transparent 0),
    linear-gradient(180deg, var(--paper) 0%, var(--paper-dark) 100%);
  background-size: 4px 4px, 100% 100%;
}

.report-header {
  border-bottom: 3px solid var(--ink);
  padding-bottom: 10px;
  margin-bottom: 12px;
  position: relative;
}

.report-header .kicker {
  font-family: 'Times New Roman', Times, serif;
  color: var(--spider-red);
  font-size: 13px;
  letter-spacing: 0.05em;
  margin-bottom: 2px;
}

.report-header h1 {
  font-family: 'Times New Roman', Times, serif;
  font-size: 28px;
  line-height: 1;
  color: var(--ink);
  text-shadow:
    -1.5px 0 0 var(--spider-cyan),
    1.5px 0 0 var(--spider-magenta),
    3px 3px 0 var(--spider-yellow);
  letter-spacing: 0.01em;
  transform: skew(-2deg);
}

.report-header .meta-line {
  font-family: 'Times New Roman', Times, serif;
  font-size: 11px;
  color: var(--ink);
  opacity: 0.7;
  margin-top: 6px;
  font-weight: 600;
}

.report-body {
  font-size: 13.5px;
  line-height: 1.52;
  color: var(--ink);
  font-weight: 600;
}

.report-body p {
  margin-bottom: 10px;
}

.report-body.essay p {
  margin-bottom: 12px;
  text-align: justify;
  text-indent: 1.2em;
}

.report-body.essay p:first-child {
  text-indent: 0;
}

.report-body p strong {
  background: var(--spider-yellow);
  padding: 0 3px;
  font-weight: 900;
}

.report-body h3 {
  font-family: 'Times New Roman', Times, serif;
  font-size: 14px;
  color: var(--spider-red);
  margin: 12px 0 6px 0;
  letter-spacing: 0.05em;
}

.report-wordcount {
  margin-top: auto;
  padding-top: 8px;
  border-top: 2px dashed var(--ink);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Times New Roman', Times, serif;
  font-size: 10px;
  color: var(--ink);
  opacity: 0.6;
}

.report-callout {
  background: var(--spider-blue);
  color: var(--paper);
  border: 2px solid var(--ink);
  box-shadow: 3px 3px 0 var(--ink);
  padding: 8px 10px;
  margin: 10px 0;
  font-family: 'Times New Roman', Times, serif;
  font-size: 12px;
  line-height: 1.3;
  transform: rotate(-1deg);
}

.report-callout.yellow {
  background: var(--spider-yellow);
  color: var(--ink);
  transform: rotate(1deg);
}

/* ============================================================
   CONCLUSION PAGE
   ============================================================ */
.conclusion-page {
  background: var(--ink);
  color: var(--paper);
}

.conclusion-page .page-inner {
  padding: clamp(14px, 2.8vw, 30px) clamp(16px, 3vw, 34px);
  gap: clamp(8px, 1.4vw, 14px);
}

.conclusion-header {
  text-align: center;
  border-bottom: 3px solid var(--spider-yellow);
  padding-bottom: 14px;
}

.conclusion-header .kicker {
  font-family: 'Times New Roman', Times, serif;
  color: var(--spider-yellow);
  font-size: 16px;
  letter-spacing: 0.05em;
}

.conclusion-header h1 {
  font-family: 'Times New Roman', Times, serif;
  font-size: clamp(32px, 5vw, 52px);
  color: var(--paper);
  text-shadow:
    -2px 0 0 var(--spider-cyan),
    2px 0 0 var(--spider-magenta),
    4px 4px 0 var(--spider-red);
  letter-spacing: 0.02em;
  transform: skew(-3deg);
  margin-top: 6px;
}

.conclusion-body {
  font-size: 13.5px;
  line-height: 1.52;
  font-weight: 600;
}

.conclusion-body p {
  margin-bottom: 10px;
}

.conclusion-body p strong {
  color: var(--spider-yellow);
  font-weight: 700;
}

.conclusion-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(6px, 1.2vw, 12px);
  margin: clamp(6px, 1.2vw, 10px) 0;
}

.stat-card {
  background: var(--spider-red);
  border: 2px solid var(--paper);
  box-shadow: 4px 4px 0 var(--spider-yellow);
  padding: 10px;
  text-align: center;
}

.stat-card:nth-child(2) { background: var(--spider-blue); box-shadow: 4px 4px 0 var(--spider-red); }
.stat-card:nth-child(3) { background: var(--spider-yellow); color: var(--ink); box-shadow: 4px 4px 0 var(--spider-blue); }

.stat-num {
  font-family: 'Times New Roman', Times, serif;
  font-size: 30px;
  line-height: 1;
  color: var(--paper);
}
.stat-card:nth-child(3) .stat-num { color: var(--ink); }

.stat-label {
  font-family: 'Times New Roman', Times, serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  margin-top: 4px;
  text-transform: uppercase;
}

.conclusion-signoff {
  margin-top: auto;
  text-align: center;
  padding-top: 12px;
  border-top: 2px dashed var(--spider-yellow);
}

.conclusion-signoff .quote {
  font-family: 'Times New Roman', Times, serif;
  font-size: 18px;
  color: var(--spider-yellow);
}

.conclusion-signoff .cite {
  font-size: 10px;
  color: var(--paper);
  opacity: 0.7;
  margin-top: 4px;
  letter-spacing: 0.1em;
}

/* ============================================================
   REFERENCES PAGE
   ============================================================ */
.references-page {
  background: var(--paper);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(0,0,0,0.10) 1px, transparent 0),
    linear-gradient(180deg, var(--paper) 0%, var(--paper-dark) 100%);
  background-size: 4px 4px, 100% 100%;
}

.references-page .page-inner {
  padding: clamp(14px, 2.4vw, 24px) clamp(16px, 2.8vw, 28px);
}

.references-header {
  border-bottom: 4px solid var(--ink);
  padding-bottom: 8px;
  margin-bottom: 10px;
  position: relative;
}

.references-header .kicker {
  font-family: 'Times New Roman', Times, serif;
  color: var(--spider-blue);
  font-size: 13px;
  font-style: italic;
  letter-spacing: 0.05em;
  margin-bottom: 2px;
}

.references-header h1 {
  font-family: 'Times New Roman', Times, serif;
  font-size: 34px;
  line-height: 1;
  color: var(--ink);
  font-weight: 900;
  font-style: italic;
  text-shadow:
    -1px 0 0 var(--spider-cyan),
    1px 0 0 var(--spider-magenta),
    2px 2px 0 var(--spider-yellow);
  letter-spacing: 0.01em;
  transform: skew(-2deg);
}

.references-header .meta-line {
  font-family: 'Times New Roman', Times, serif;
  font-size: 11px;
  color: var(--ink);
  opacity: 0.7;
  margin-top: 6px;
  font-weight: 600;
  font-style: italic;
}

.references-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  counter-reset: refnum;
}

.ref-item {
  background: linear-gradient(90deg, rgba(255,214,10,0.18), rgba(244,236,216,0.98));
  border: 2px solid var(--ink);
  border-left: 7px solid var(--spider-red);
  box-shadow: 4px 4px 0 var(--spider-blue);
  padding: 8px 10px 8px 40px;
  position: relative;
  font-family: 'Times New Roman', Times, serif;
  font-size: 12px;
  line-height: 1.38;
  color: var(--ink);
  counter-increment: refnum;
}

.ref-item:nth-child(even) {
  border-left-color: var(--spider-blue);
  box-shadow: 4px 4px 0 var(--spider-red);
}

.ref-item::before {
  content: counter(refnum);
  position: absolute;
  top: 8px;
  left: 8px;
  width: 22px;
  height: 22px;
  background: var(--spider-yellow);
  border: 2px solid var(--ink);
  display: grid;
  place-items: center;
  font-family: 'Times New Roman', Times, serif;
  font-weight: 900;
  font-style: italic;
  font-size: 12px;
  color: var(--ink);
  box-shadow: 1.5px 1.5px 0 var(--ink);
}

.ref-item.video::before { background: var(--spider-red); color: var(--paper); }
.ref-item.book::before  { background: var(--spider-blue); color: var(--paper); }
.ref-item.film::before  { background: var(--spider-yellow); color: var(--ink); }
.ref-item.web::before   { background: var(--paper-dark); color: var(--ink); }

.ref-author {
  font-weight: 900;
  font-style: italic;
}

.ref-title {
  font-style: italic;
}

.ref-source {
  color: var(--spider-red);
  font-weight: 700;
}

.ref-link {
  display: inline-block;
  word-break: break-all;
  background: var(--spider-yellow);
  color: var(--ink);
  padding: 1px 4px;

.nav-controls {
  position: fixed;

  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--ink);
  border: 3px solid var(--spider-yellow);
  padding: 8px 14px;
  box-shadow: 5px 5px 0 var(--spider-red);
  z-index: 100;
}

.nav-btn {
  background: var(--spider-yellow);
  color: var(--ink);
  border: 2px solid var(--ink);
  padding: 7px 12px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 12px;
  cursor: pointer;
  letter-spacing: 0.05em;
  box-shadow: 3px 3px 0 var(--paper);

}

  box-shadow: 1px 1px 0 var(--paper);

.page-indicator {

  font-size: 13px;

}

.page-indicator .current {
  color: var(--paper);
  font-size: 18px;
}

.toc-toggle {
  background: var(--paper);
  color: var(--ink);
  border: 2px solid var(--ink);
  padding: 7px 10px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 12px;
  cursor: pointer;
  box-shadow: 3px 3px 0 var(--spider-blue);
}

.zoom-btn {
  background: var(--paper-dark);
  color: var(--ink);
  border: 2px solid var(--ink);
  padding: 7px 10px;
  min-width: 48px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 12px;
  cursor: pointer;
  box-shadow: 3px 3px 0 var(--spider-cyan);
}

.zoom-btn.active {
  background: var(--spider-cyan);
  color: var(--paper);
}

.zoom-level {
  font-family: 'Times New Roman', Times, serif;
  color: var(--paper);
  min-width: 52px;
  text-align: center;
  font-size: 11px;
  letter-spacing: 0.05em;
}

.view-toggle {
  display: flex;
  align-items: stretch;
  border: 2px solid var(--ink);
  box-shadow: 3px 3px 0 var(--spider-magenta);
  background: var(--paper-dark);
}

.view-btn {
  appearance: none;
  border: 0;
  border-right: 2px solid var(--ink);
  background: var(--paper-dark);
  color: var(--ink);

  min-width: 58px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.06em;
  cursor: pointer;
}

.view-btn:last-child { border-right: 0; }

.view-btn.active {
  background: var(--spider-blue);
  color: var(--paper);
}

.toc-panel {
  position: fixed;
  top: 50%;
  right: 20px;
  transform: translateY(-50%) translateX(20px);
  background: var(--ink);
  border: 3px solid var(--spider-yellow);
  box-shadow: 5px 5px 0 var(--spider-red);
  padding: 14px;
  z-index: 99;
  max-height: 80vh;
  overflow-y: auto;
  width: 220px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
}

.toc-panel.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(-50%) translateX(0);
}

.toc-panel h3 {
  font-family: 'Times New Roman', Times, serif;
  color: var(--spider-yellow);
  font-size: 13px;
  margin-bottom: 8px;
  letter-spacing: 0.05em;
}

.toc-item {
  display: block;
  width: 100%;
  text-align: left;
  background: transparent;
  color: var(--paper);
  border: none;
  padding: 5px 6px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 11px;
  cursor: pointer;
  border-left: 3px solid transparent;
  margin-bottom: 1px;
  transition: all 0.15s;
}

.toc-item:hover {
  background: rgba(255,214,10,0.15);
  border-left-color: var(--spider-yellow);
  color: var(--spider-yellow);
}

.toc-item.active {
  background: var(--spider-red);
  border-left-color: var(--spider-yellow);
  color: var(--paper);
  font-weight: 700;
}

.toc-item .num {
  font-family: 'Times New Roman', Times, serif;
  font-size: 10px;
  margin-right: 6px;
  color: var(--spider-yellow);
}

/* ============================================================
   INITIALIZE StPageFlip
   ============================================================ */
const MOBILE_BREAKPOINT = 700;
const BOOK_PAGE_RATIO = 520 / 740;
const DESIGN_PAGE_WIDTH = 620;
const DESIGN_PAGE_HEIGHT = Math.round(DESIGN_PAGE_WIDTH / BOOK_PAGE_RATIO);
const MIN_FIT_ZOOM = 0.18;
const FIT_MARGIN = 0.985;
const LOOP_PAGE_COUNT = 1;
const initialBookMarkup = flipbookEl.innerHTML;
let pageFlip;
let totalPages = 0;
let visiblePageCount = 0;
let fitZoom = 1;
let manualZoom = null;
let currentZoom = 1;
let pinchStartDistance = 0;
let pinchStartZoom = 1;
let currentViewMode = getViewportWidth() <= MOBILE_BREAKPOINT ? 'single' : 'spread';
let loopResetTimer = null;

function getViewportWidth() {
  return window.visualViewport ? window.visualViewport.width : window.innerWidth;
}

function getViewportHeight() {
  return window.visualViewport ? window.visualViewport.height : window.innerHeight;
}

function getNavReserve() {
  const baseGap = getViewportWidth() <= MOBILE_BREAKPOINT ? 28 : 22;
  return (navControls ? navControls.offsetHeight : 0) + baseGap;
}

function syncViewportVars() {
  document.documentElement.style.setProperty('--app-height', `${Math.round(getViewportHeight())}px`);
  document.documentElement.style.setProperty('--nav-reserve', `${Math.round(getNavReserve())}px`);
}

function getBookRect() {
  if (pageFlip && typeof pageFlip.getBoundsRect === 'function') {
    return pageFlip.getBoundsRect();
  }

  return {
    width: DESIGN_PAGE_WIDTH,
    height: DESIGN_PAGE_HEIGHT,
    pageWidth: DESIGN_PAGE_WIDTH
  };
}

function getFitBookRect() {
  const bookRect = getBookRect();
  if (currentViewMode !== 'single') return bookRect;

  const renderedRect = flipbookEl.getBoundingClientRect();
  const scale = currentZoom > 0 ? currentZoom : 1;
  const renderedWidth = renderedRect.width / scale;
  const renderedHeight = renderedRect.height / scale;
  const portraitOffsetY = Math.max(0, Math.abs(bookRect.top || 0));

  return {
    ...bookRect,
    width: renderedWidth || (bookRect.pageWidth || DESIGN_PAGE_WIDTH),
    height: Math.max(bookRect.height + (portraitOffsetY * 2), renderedHeight || 0)
  };
}

function getAvailableBookArea() {
  const width = Math.max(160, bookViewport.clientWidth - 12);
  const height = Math.max(180, bookViewport.clientHeight - 12);

  return { width, height };
}

function getMinZoom() {
  return Math.min(0.4, fitZoom);
}

function getMaxZoom() {
  return Math.max(3.2, fitZoom * 2.2);
}

function clampZoom(value) {
  return Math.min(getMaxZoom(), Math.max(getMinZoom(), value));
}

function updateCompactMode(bookRect, zoom) {
  const scaledPageWidth = (bookRect.pageWidth || bookRect.width) * zoom;
  document.body.classList.toggle('book-compact', scaledPageWidth < 500 || currentViewMode === 'single');
}

function applyBookScale() {
  if (!bookViewport) return;

  const bookRect = getFitBookRect();
  const available = getAvailableBookArea();
  fitZoom = Math.min(available.width / bookRect.width, available.height / bookRect.height) * FIT_MARGIN;
  fitZoom = Math.max(MIN_FIT_ZOOM, fitZoom);

  currentZoom = manualZoom === null ? fitZoom : clampZoom(manualZoom);
  bookViewport.classList.toggle('is-zoomed', manualZoom !== null && currentZoom > fitZoom + 0.03);
  document.documentElement.style.setProperty('--book-scale', currentZoom.toFixed(4));
  bookShell.style.width = `${Math.ceil(bookRect.width * currentZoom)}px`;
  bookShell.style.height = `${Math.ceil(bookRect.height * currentZoom)}px`;

  if (zoomLevelEl) {
    zoomLevelEl.textContent = `${Math.round(currentZoom * 100)}%`;
  }

  if (zoomFitBtn) {
    zoomFitBtn.classList.toggle('active', manualZoom === null);
  }

  updateCompactMode(bookRect, currentZoom);
}

function setZoom(nextZoom) {
  manualZoom = clampZoom(nextZoom);
  applyBookScale();
}

function resetZoomToFit() {
  manualZoom = null;
  applyBookScale();
}

function getPanState() {
  const maxLeft = Math.max(0, bookViewport.scrollWidth - bookViewport.clientWidth);
  const maxTop = Math.max(0, bookViewport.scrollHeight - bookViewport.clientHeight);
  return {
    maxLeft,
    maxTop,
    atLeft: bookViewport.scrollLeft <= 2,
    atRight: bookViewport.scrollLeft >= maxLeft - 2,
    atTop: bookViewport.scrollTop <= 2,
    atBottom: bookViewport.scrollTop >= maxTop - 2,
    canPanX: maxLeft > 2,
    canPanY: maxTop > 2
  };
}

function isZoomPanMode() {
  const pan = getPanState();
  return currentZoom > fitZoom + 0.03 && (pan.canPanX || pan.canPanY);
}

function panViewportBy(deltaX = 0, deltaY = 0) {
  const beforeLeft = bookViewport.scrollLeft;
  const beforeTop = bookViewport.scrollTop;
  bookViewport.scrollLeft += deltaX;
  bookViewport.scrollTop += deltaY;
  return Math.abs(bookViewport.scrollLeft - beforeLeft) > 0.5 ||
         Math.abs(bookViewport.scrollTop - beforeTop) > 0.5;
}

function flipFromHorizontalEdge(deltaX) {
  const pan = getPanState();
  if (!pan.canPanX) return false;
  if (deltaX > 20 && pan.atRight) {
    goForwardOrLoopBook();
    return true;
  }
  if (deltaX < -20 && pan.atLeft) {
    pageFlip.flipPrev();
    return true;
  }
  return false;
}

function updateViewButtons() {
  viewModeButtons.forEach(btn => {
    const active = btn.dataset.viewMode === currentViewMode;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
}

function setViewMode(mode) {
  if (mode !== 'spread' && mode !== 'single') return;
  if (mode === currentViewMode && pageFlip) return;

  const targetPage = pageFlip ? pageFlip.getCurrentPageIndex() : 0;
  currentViewMode = mode;
  manualZoom = null;
  createPageFlip(targetPage);
}

function createPageFlip(targetPage = 0) {
  syncViewportVars();
  flipbookEl.innerHTML = initialBookMarkup;
  const singlePageMode = currentViewMode === 'single';
  document.body.classList.toggle('view-single', singlePageMode);
  bookViewport.classList.toggle('single-page-mode', singlePageMode);
  updateViewButtons();

  pageFlip = new St.PageFlip(flipbookEl, {
    width: DESIGN_PAGE_WIDTH,
    height: DESIGN_PAGE_HEIGHT,
    size: 'fixed',
    autoSize: true,
    maxShadowOpacity: 0.5,
    showCover: true,
    mobileScrollSupport: true,
    usePortrait: singlePageMode,
    drawShadow: true,
    flippingTime: 800,
    useMouseEvents: true,
    swipeDistance: 30,
    disableFlipByClick: false
  });

  pageFlip.loadFromHTML(flipbookEl.querySelectorAll('.page'));

  totalPages = pageFlip.getPageCount();
  visiblePageCount = Math.max(1, totalPages - LOOP_PAGE_COUNT);
  document.getElementById('totalPages').textContent = visiblePageCount;
  pageFlip.on('flip', handleFlipComplete);
  pageFlip.on('changeOrientation', () => {
    requestAnimationFrame(() => {
      applyBookScale();
      updateUI();
    });
  });

  const safePageIndex = Math.max(0, Math.min(targetPage, visiblePageCount - 1));
  if (safePageIndex > 0) {
    if (typeof pageFlip.turnToPage === 'function') pageFlip.turnToPage(safePageIndex);
    else pageFlip.flip(safePageIndex);
  }

  requestAnimationFrame(() => {
    applyBookScale();
    updateUI();
    requestAnimationFrame(() => {
      applyBookScale();
      updateUI();
    });
  });
}

/* ============================================================
   NAVIGATION CONTROLS

const currentPageEl = document.getElementById('currentPage');
const prevBtn = document.getElementById('prevBtn');

function updateUI() {
  if (!pageFlip) return;

createPageFlip();

prevBtn.addEventListener('click', () => pageFlip.flipPrev());
nextBtn.addEventListener('click', goForwardOrLoopBook);
zoomOutBtn.addEventListener('click', () => setZoom((manualZoom === null ? fitZoom : currentZoom) - 0.12));
zoomInBtn.addEventListener('click', () => setZoom((manualZoom === null ? fitZoom : currentZoom) + 0.12));
zoomFitBtn.addEventListener('click', resetZoomToFit);
viewModeButtons.forEach(btn => {
  btn.addEventListener('click', () => setViewMode(btn.dataset.viewMode));
});

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); setZoom((manualZoom === null ? fitZoom : currentZoom) + 0.12); }
    if (e.key === '-') { e.preventDefault(); setZoom((manualZoom === null ? fitZoom : currentZoom) - 0.12); }
    if (e.key === '0') { e.preventDefault(); resetZoomToFit(); }
    return;
  }

  if (isZoomPanMode()) {
    const panStep = e.shiftKey ? 180 : 90;
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      if (!panViewportBy(panStep, 0)) flipFromHorizontalEdge(panStep);
      return;
    }
    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (!panViewportBy(-panStep, 0)) flipFromHorizontalEdge(-panStep);
      return;
    }
    if (e.key === 'ArrowDown' || e.key === ' ') {
      e.preventDefault();
      panViewportBy(0, panStep);
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      panViewportBy(0, -panStep);
      return;
    }
  }

  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goForwardOrLoopBook(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); pageFlip.flipPrev(); }
});

bookViewport.addEventListener('wheel', (e) => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  const nextZoom = (manualZoom === null ? fitZoom : currentZoom) + (e.deltaY < 0 ? 0.08 : -0.08);
  setZoom(nextZoom);
}, { passive: false });

/* ------------------------------------------------------------
   MOUSE WHEEL / TRACKPAD
   - Zoomed in: pan the viewport first. Shift + wheel pans sideways.
   - Only flip horizontally when already at the left/right edge.
   - Fit mode: wheel still flips pages.
   ------------------------------------------------------------ */
let wheelLock = false;
flipbookEl.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) {
    return;
  }

  if (isZoomPanMode()) {
    e.preventDefault();
    const panX = e.shiftKey ? e.deltaY : e.deltaX;
    const panY = e.shiftKey ? 0 : e.deltaY;
    const didPan = panViewportBy(panX, panY);
    const horizontalIntent = Math.abs(panX) > Math.max(24, Math.abs(panY) * 1.2);
    if (!didPan && horizontalIntent && !wheelLock) {
      wheelLock = flipFromHorizontalEdge(panX);
      if (wheelLock) setTimeout(() => { wheelLock = false; }, 900);
    }
    return;
  }

  // Only trigger if the user isn't scrolling inside a page's inner scrollable area.
  const inner = e.target.closest('.page-inner');
  if (inner) {
    const canScrollDown = inner.scrollTop + inner.clientHeight < inner.scrollHeight - 2;
    const canScrollUp   = inner.scrollTop > 2;
    if ((e.deltaY > 0 && canScrollDown) || (e.deltaY < 0 && canScrollUp)) {
      return; // let the page scroll instead of flipping
    }
  }
  e.preventDefault();
  if (wheelLock) return;
  wheelLock = true;
  setTimeout(() => { wheelLock = false; }, 900); // match flippingTime

  if (e.deltaY > 20)  goForwardOrLoopBook();
  if (e.deltaY < -20) pageFlip.flipPrev();
}, { passive: false });

/* ------------------------------------------------------------
   TOUCH SWIPE — horizontal swipe on phones/tablets
   StPageFlip already handles corner-drag; this adds a
   whole-page swipe gesture for easier phone use.
   ------------------------------------------------------------ */
let touchStartX = 0, touchStartY = 0, touchLastX = 0, touchLastY = 0, touchMoved = false, touchPanned = false;
function getTouchDistance(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.hypot(dx, dy);
}

bookViewport.addEventListener('touchstart', (e) => {
  if (e.touches.length !== 2) return;
  pinchStartDistance = getTouchDistance(e.touches);
  pinchStartZoom = manualZoom === null ? fitZoom : currentZoom;
}, { passive: true });

bookViewport.addEventListener('touchmove', (e) => {
  if (e.touches.length !== 2 || pinchStartDistance === 0) return;
  e.preventDefault();
  const pinchScale = getTouchDistance(e.touches) / pinchStartDistance;
  setZoom(pinchStartZoom * pinchScale);
}, { passive: false });

bookViewport.addEventListener('touchend', () => {
  pinchStartDistance = 0;
});

bookViewport.addEventListener('touchcancel', () => {
  pinchStartDistance = 0;
});

flipbookEl.addEventListener('touchstart', (e) => {
  if (e.touches.length !== 1) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchLastX = touchStartX;
  touchLastY = touchStartY;
  touchMoved = false;
  touchPanned = false;
  if (isZoomPanMode()) {
    e.stopImmediatePropagation();
  }
}, { passive: true, capture: true });

flipbookEl.addEventListener('touchmove', (e) => {
  if (e.touches.length !== 1 || pinchStartDistance !== 0) return;
  touchMoved = true;

  if (isZoomPanMode()) {
    const nextX = e.touches[0].clientX;
    const nextY = e.touches[0].clientY;
    const panX = touchLastX - nextX;
    const panY = touchLastY - nextY;
    if (panViewportBy(panX, panY)) {
      touchPanned = true;
    }
    touchLastX = nextX;
    touchLastY = nextY;
    e.preventDefault();
    e.stopImmediatePropagation();
  }
}, { passive: false, capture: true });

flipbookEl.addEventListener('touchend', (e) => {
  if (pinchStartDistance !== 0 || !touchMoved || e.changedTouches.length !== 1) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;

  // In zoom mode, dragging pans first. Flip only from the outer horizontal edge.
  if (isZoomPanMode()) {
    e.preventDefault();
    e.stopImmediatePropagation();
    if (touchPanned) return;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      flipFromHorizontalEdge(-dx);
    }
    return;
  }

  // Fit mode: horizontal swipe flips pages.
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) goForwardOrLoopBook();
    else        pageFlip.flipPrev();
  }
}, { passive: false, capture: true });

const tocBackdrop = document.getElementById('tocBackdrop');

function openToc()  { tocPanel.classList.add('open');    tocBackdrop.classList.add('open'); }
function closeToc() { tocPanel.classList.remove('open'); tocBackdrop.classList.remove('open'); }

document.getElementById('tocToggle').addEventListener('click', (e) => {
  e.stopPropagation();
  if (tocPanel.classList.contains('open')) closeToc();
  else openToc();
});

tocBackdrop.addEventListener('click', closeToc);

document.addEventListener('click', (e) => {
  if (!tocPanel.contains(e.target) && !e.target.closest('#tocToggle')) {
    closeToc();
  }
});

updateUI();

/* ------------------------------------------------------------
   RESIZE HANDLING — adapt book to new screen size on rotate/resize
   ------------------------------------------------------------ */
let resizeTimer;
function refreshLayout() {
  syncViewportVars();
  if (!pageFlip) {
    createPageFlip();
    return;
  }

  try {
    pageFlip.update();
  } catch (e) {
    /* ignore if lib doesn't expose update */
  }

  requestAnimationFrame(() => {
    applyBookScale();
    updateUI();
  });
}

window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    refreshLayout();
  }, 200);
});

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      refreshLayout();
    }, 200);
  });
}

/* ------------------------------------------------------------
   COVER OPEN / LOOP behavior
   - Click the front cover hint to open the book
   - Advancing past the final page flips to a loop cover, then resets to front
   ------------------------------------------------------------ */
function resetBookToFront() {
  if (!pageFlip) return;
  createPageFlip(0);
}

function turnToPageIndex(index) {
  if (!pageFlip) return;
  const safeIndex = Math.max(0, Math.min(index, totalPages - 1));
  if (typeof pageFlip.turnToPage === 'function') pageFlip.turnToPage(safeIndex);
  else pageFlip.flip(safeIndex);
  requestAnimationFrame(() => {
    applyBookScale();
    updateUI();
  });
}

function handleFlipComplete(e) {
  if (!pageFlip) return;
  const flippedPage = e && typeof e.data === 'number' ? e.data : pageFlip.getCurrentPageIndex();
  if (flippedPage >= visiblePageCount) {
    window.clearTimeout(loopResetTimer);
    loopResetTimer = window.setTimeout(resetBookToFront, 120);
    return;
  }
  updateUI();
}

function goForwardOrLoopBook() {
  if (!pageFlip) return;
  if (currentViewMode === 'single' && pageFlip.getCurrentPageIndex() === 0) {
    turnToPageIndex(1);
    return;
  }
  if (pageFlip.getCurrentPageIndex() >= totalPages - 1) {
    resetBookToFront();
    return;
  }
  pageFlip.flipNext();
}

flipbookEl.addEventListener('click', (e) => {
  const openHint = e.target.closest('#openCoverHint');
  if (openHint) {
    e.preventDefault();
    e.stopPropagation();
    goForwardOrLoopBook();
    return;
  }
});
</script>
